<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ── */
    :root {
      --bg        : #0c0c0f;
      --surface   : #13131a;
      --border    : #1e1e2e;
      --accent    : #c8a96e;
      --accent-dim: #8a7048;
      --text      : #e8e4dc;
      --text-dim  : #6b6880;
      --user-bg   : #1a1a28;
      --bot-bg    : #111118;
      --success   : #4caf7d;
      --error     : #e05c5c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family     : 'DM Mono', monospace;
      background      : var(--bg);
      color           : var(--text);
      height          : 100vh;
      display         : flex;
      flex-direction  : column;
      overflow        : hidden;
    }

    /* ── Header ── */
    header {
      display         : flex;
      align-items     : center;
      justify-content : space-between;
      padding         : 16px 28px;
      border-bottom   : 1px solid var(--border);
      background      : var(--surface);
    }

    .logo {
      font-family  : 'Instrument Serif', serif;
      font-size    : 1.4rem;
      color        : var(--accent);
      letter-spacing: 0.02em;
    }

    .logo span {
      color        : var(--text-dim);
      font-style   : italic;
      font-size    : 0.9rem;
      margin-left  : 8px;
    }

    /* ── Layout ── */
    .app {
      display   : flex;
      flex      : 1;
      overflow  : hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width         : 240px;
      border-right  : 1px solid var(--border);
      background    : var(--surface);
      display       : flex;
      flex-direction: column;
      padding       : 16px 12px;
      gap           : 8px;
    }

    .sidebar-title {
      font-size    : 0.65rem;
      color        : var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding      : 0 8px;
      margin-bottom: 4px;
    }

    .btn-new {
      display       : flex;
      align-items   : center;
      gap           : 8px;
      padding       : 10px 12px;
      background    : transparent;
      border        : 1px solid var(--accent-dim);
      color         : var(--accent);
      font-family   : 'DM Mono', monospace;
      font-size     : 0.75rem;
      cursor        : pointer;
      border-radius : 6px;
      transition    : all 0.2s;
      width         : 100%;
      letter-spacing: 0.05em;
    }

    .btn-new:hover {
      background  : rgba(200, 169, 110, 0.08);
      border-color: var(--accent);
    }

    .sessions-list {
      flex      : 1;
      overflow-y: auto;
      display   : flex;
      flex-direction: column;
      gap       : 4px;
    }

    .session-item {
      padding      : 9px 12px;
      border-radius: 6px;
      cursor       : pointer;
      font-size    : 0.72rem;
      color        : var(--text-dim);
      transition   : all 0.15s;
      white-space  : nowrap;
      overflow     : hidden;
      text-overflow: ellipsis;
      border       : 1px solid transparent;
    }

    .session-item:hover { 
      background  : rgba(255,255,255,0.04);
      color       : var(--text);
    }

    .session-item.active {
      background  : rgba(200, 169, 110, 0.08);
      border-color: var(--accent-dim);
      color       : var(--accent);
    }

    /* ── Upload ── */
    .upload-area {
      border-top  : 1px solid var(--border);
      padding-top : 12px;
      margin-top  : 8px;
    }

    .upload-label {
      display      : flex;
      align-items  : center;
      gap          : 8px;
      padding      : 10px 12px;
      border       : 1px dashed var(--border);
      border-radius: 6px;
      cursor       : pointer;
      font-size    : 0.72rem;
      color        : var(--text-dim);
      transition   : all 0.2s;
    }

    .upload-label:hover {
      border-color: var(--accent-dim);
      color       : var(--accent);
    }

    #file-input { display: none; }

    .upload-status {
      font-size  : 0.68rem;
      padding    : 4px 4px;
      color      : var(--text-dim);
      min-height : 20px;
    }

    .upload-status.success { color: var(--success); }
    .upload-status.error   { color: var(--error);   }

    /* ── Chat area ── */
    .chat-area {
      flex          : 1;
      display       : flex;
      flex-direction: column;
      overflow      : hidden;
    }

    .messages {
      flex      : 1;
      overflow-y: auto;
      padding   : 28px 32px;
      display   : flex;
      flex-direction: column;
      gap       : 24px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Messages ── */
    .message {
      display       : flex;
      flex-direction: column;
      gap           : 8px;
      animation     : fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    .message-role {
      font-size    : 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color        : var(--text-dim);
    }

    .message.user .message-role { color: var(--accent-dim); }

    .message-bubble {
      padding      : 14px 18px;
      border-radius: 8px;
      font-size    : 0.82rem;
      line-height  : 1.7;
      max-width    : 760px;
    }

    .message.user .message-bubble {
      background  : var(--user-bg);
      border      : 1px solid var(--border);
      align-self  : flex-end;
    }

    .message.bot .message-bubble {
      background  : var(--bot-bg);
      border      : 1px solid var(--border);
    }

    /* ── Sources ── */
    .sources {
      display  : flex;
      flex-wrap: wrap;
      gap      : 6px;
      margin-top: 4px;
    }

    .source-chip {
      font-size    : 0.65rem;
      padding      : 4px 10px;
      background   : rgba(200, 169, 110, 0.06);
      border       : 1px solid var(--accent-dim);
      border-radius: 4px;
      color        : var(--accent);
      cursor       : pointer;
      transition   : all 0.15s;
      letter-spacing: 0.03em;
    }

    .source-chip:hover {
      background: rgba(200, 169, 110, 0.14);
    }

    /* ── Chunk popup ── */
    .popup-overlay {
      display        : none;
      position       : fixed;
      inset          : 0;
      background     : rgba(0,0,0,0.7);
      z-index        : 100;
      align-items    : center;
      justify-content: center;
    }

    .popup-overlay.show { display: flex; }

    .popup {
      background   : var(--surface);
      border       : 1px solid var(--border);
      border-radius: 10px;
      padding      : 24px;
      max-width    : 600px;
      width        : 90%;
      max-height   : 70vh;
      overflow-y   : auto;
    }

    .popup-header {
      display        : flex;
      justify-content: space-between;
      align-items    : center;
      margin-bottom  : 16px;
    }

    .popup-title {
      font-size    : 0.72rem;
      color        : var(--accent);
      letter-spacing: 0.08em;
    }

    .popup-close {
      background  : none;
      border      : none;
      color       : var(--text-dim);
      cursor      : pointer;
      font-size   : 1.2rem;
      line-height : 1;
    }

    .popup-text {
      font-size  : 0.8rem;
      line-height: 1.8;
      color      : var(--text);
      white-space: pre-wrap;
    }

    /* ── Input area ── */
    .input-area {
      padding      : 16px 32px 24px;
      border-top   : 1px solid var(--border);
      background   : var(--surface);
    }

    .input-row {
      display      : flex;
      gap          : 10px;
      align-items  : flex-end;
    }

    #question-input {
      flex         : 1;
      background   : var(--bg);
      border       : 1px solid var(--border);
      border-radius: 8px;
      padding      : 12px 16px;
      color        : var(--text);
      font-family  : 'DM Mono', monospace;
      font-size    : 0.82rem;
      resize       : none;
      min-height   : 48px;
      max-height   : 140px;
      outline      : none;
      transition   : border-color 0.2s;
      line-height  : 1.5;
    }

    #question-input:focus { border-color: var(--accent-dim); }
    #question-input::placeholder { color: var(--text-dim); }

    .btn-send {
      padding      : 12px 20px;
      background   : var(--accent);
      color        : #0c0c0f;
      border       : none;
      border-radius: 8px;
      font-family  : 'DM Mono', monospace;
      font-size    : 0.78rem;
      font-weight  : 500;
      cursor       : pointer;
      transition   : all 0.2s;
      white-space  : nowrap;
      letter-spacing: 0.05em;
    }

    .btn-send:hover   { background: #d4b87a; }
    .btn-send:disabled {
      opacity : 0.4;
      cursor  : not-allowed;
    }

    /* ── Empty state ── */
    .empty-state {
      flex          : 1;
      display       : flex;
      flex-direction: column;
      align-items   : center;
      justify-content: center;
      color         : var(--text-dim);
      gap           : 12px;
    }

    .empty-icon {
      font-size   : 2.5rem;
      opacity     : 0.3;
    }

    .empty-text {
      font-family  : 'Instrument Serif', serif;
      font-size    : 1.1rem;
      font-style   : italic;
    }

    .empty-sub {
      font-size: 0.72rem;
      opacity  : 0.6;
    }

    /* ── Typing indicator ── */
    .typing {
      display    : flex;
      gap        : 5px;
      padding    : 14px 18px;
      background : var(--bot-bg);
      border     : 1px solid var(--border);
      border-radius: 8px;
      width      : fit-content;
    }

    .typing span {
      width        : 6px;
      height       : 6px;
      background   : var(--text-dim);
      border-radius: 50%;
      animation    : bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0);    }
      30%            { transform: translateY(-6px); }
    }

    /* ── User ID input ── */
    .user-id-bar {
      display    : flex;
      align-items: center;
      gap        : 8px;
      font-size  : 0.68rem;
      color      : var(--text-dim);
      margin-bottom: 10px;
    }

    #user-id-input {
      background   : var(--bg);
      border       : 1px solid var(--border);
      border-radius: 4px;
      padding      : 4px 8px;
      color        : var(--text);
      font-family  : 'DM Mono', monospace;
      font-size    : 0.68rem;
      outline      : none;
      width        : 160px;
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">RAG Chatbot <span>/ powered by Amazon Nova</span></div>
  <div style="font-size:0.68rem; color:var(--text-dim);">ask your documents anything</div>
</header>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">Sessions</div>

    <button class="btn-new" onclick="newSession()">
      <span>＋</span> New Chat
    </button>

    <div class="sessions-list" id="sessions-list"></div>

    <!-- Upload -->
    <div class="upload-area">
      <label class="upload-label" for="file-input">
        <span>📎</span> Upload PDF
      </label>
      <input type="file" id="file-input" accept=".pdf" onchange="uploadPdf(event)" />
      <div class="upload-status" id="upload-status"></div>
    </div>
  </aside>

  <!-- Chat -->
  <main class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📖</div>
        <div class="empty-text">Start a new chat</div>
        <div class="empty-sub">Upload a PDF and ask questions about it</div>
      </div>
    </div>

    <div class="input-area">
      <div class="user-id-bar">
        user_id:
        <input type="text" id="user-id-input" value="default_user" placeholder="your user id" />
      </div>
      <div class="input-row">
        <textarea
          id="question-input"
          placeholder="Ask something about your document..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="btn-send" id="send-btn" onclick="sendMessage()">Send →</button>
      </div>
    </div>
  </main>
</div>

<!-- Chunk popup -->
<div class="popup-overlay" id="popup-overlay" onclick="closePopup(event)">
  <div class="popup">
    <div class="popup-header">
      <div class="popup-title" id="popup-title"></div>
      <button class="popup-close" onclick="closePopupDirect()">✕</button>
    </div>
    <div class="popup-text" id="popup-text"></div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────
  const API = "https://qgfrp8zcoc.execute-api.us-east-1.amazonaws.com";

  // ── State ────────────────────────────────────────────────
  let currentSessionId = null;
  let sessions         = [];

  // ── Get user ID ──────────────────────────────────────────
  function getUserId() {
    return document.getElementById("user-id-input").value.trim() || "default_user";
  }

  // ── New session ──────────────────────────────────────────
  async function newSession() {
    const res  = await fetch(`${API}/sessions/new`, {
      method : "POST",
      headers: { "Content-Type": "application/json" },
      body   : JSON.stringify({ user_id: getUserId() }),
    });
    const data = await res.json();
    currentSessionId = data.session_id;

    sessions.unshift({ session_id: data.session_id, label: "New Chat" });
    renderSessions();
    clearMessages();
  }

  // ── Render sessions ──────────────────────────────────────
  function renderSessions() {
    const list = document.getElementById("sessions-list");
    list.innerHTML = sessions.map((s, i) => `
      <div
        class="session-item ${s.session_id === currentSessionId ? "active" : ""}"
        onclick="switchSession('${s.session_id}', ${i})"
      >${s.label || s.session_id.slice(0, 20) + "..."}</div>
    `).join("");
  }

  // ── Switch session ───────────────────────────────────────
  async function switchSession(sessionId, index) {
    currentSessionId = sessionId;
    renderSessions();
    clearMessages();

    const res  = await fetch(`${API}/sessions/${sessionId}`);
    const data = await res.json();

    data.messages.forEach(msg => {
      if (msg.role === "user") appendUserMessage(msg.content);
      else appendBotMessage(msg.content, []);
    });
  }

  // ── Send message ─────────────────────────────────────────
  async function sendMessage() {
    const input    = document.getElementById("question-input");
    const question = input.value.trim();
    if (!question) return;

    if (!currentSessionId) await newSession();

    input.value = "";
    autoResize(input);
    setLoading(true);

    appendUserMessage(question);
    const typingEl = appendTyping();

    try {
      const res  = await fetch(`${API}/chat`, {
        method : "POST",
        headers: { "Content-Type": "application/json" },
        body   : JSON.stringify({
          question,
          user_id   : getUserId(),
          session_id: currentSessionId,
        }),
      });

      const data = await res.json();
      typingEl.remove();

      if (res.ok) {
        appendBotMessage(data.answer, data.sources || []);

        // Update session label with first question
        const idx = sessions.findIndex(s => s.session_id === currentSessionId);
        if (idx !== -1 && sessions[idx].label === "New Chat") {
          sessions[idx].label = question.slice(0, 30) + "...";
          renderSessions();
        }
      } else {
        appendBotMessage(`⚠️ Error: ${data.detail || "Something went wrong"}`, []);
      }
    } catch (e) {
      typingEl.remove();
      appendBotMessage("⚠️ Network error — please try again.", []);
    }

    setLoading(false);
  }

  // ── Append messages ──────────────────────────────────────
  function appendUserMessage(text) {
    hideEmpty();
    const el = document.createElement("div");
    el.className = "message user";
    el.innerHTML = `
      <div class="message-role">you</div>
      <div class="message-bubble">${escapeHtml(text)}</div>
    `;
    document.getElementById("messages").appendChild(el);
    scrollToBottom();
  }

  function appendBotMessage(text, sources) {
    hideEmpty();
    const sourcesHtml = sources.map(s => `
      <span class="source-chip" onclick='showChunk(${JSON.stringify(s)})'>
        ${escapeHtml(s.display)}
      </span>
    `).join("");

    const el = document.createElement("div");
    el.className = "message bot";
    el.innerHTML = `
      <div class="message-role">assistant</div>
      <div class="message-bubble">${escapeHtml(text)}</div>
      ${sources.length ? `<div class="sources">${sourcesHtml}</div>` : ""}
    `;
    document.getElementById("messages").appendChild(el);
    scrollToBottom();
  }

  function appendTyping() {
    hideEmpty();
    const el = document.createElement("div");
    el.className = "message bot";
    el.innerHTML = `
      <div class="message-role">assistant</div>
      <div class="typing"><span></span><span></span><span></span></div>
    `;
    document.getElementById("messages").appendChild(el);
    scrollToBottom();
    return el;
  }

  // ── Show chunk popup ─────────────────────────────────────
  function showChunk(source) {
    document.getElementById("popup-title").textContent = source.display;
    document.getElementById("popup-text").textContent  = source.text;
    document.getElementById("popup-overlay").classList.add("show");
  }

  function closePopup(e) {
    if (e.target === document.getElementById("popup-overlay")) closePopupDirect();
  }

  function closePopupDirect() {
    document.getElementById("popup-overlay").classList.remove("show");
  }

  // ── Upload PDF ───────────────────────────────────────────
  async function uploadPdf(event) {
    const file   = event.target.files[0];
    if (!file) return;

    const status = document.getElementById("upload-status");
    status.textContent = "⏳ Uploading...";
    status.className   = "upload-status";

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res  = await fetch(`${API}/upload?user_id=${getUserId()}`, {
        method: "POST",
        body  : formData,
      });
      const data = await res.json();

      if (res.ok) {
        status.textContent = `✓ ${file.name} uploaded`;
        status.className   = "upload-status success";
      } else {
        status.textContent = `✗ ${data.detail}`;
        status.className   = "upload-status error";
      }
    } catch (e) {
      status.textContent = "✗ Upload failed";
      status.className   = "upload-status error";
    }

    event.target.value = "";
  }

  // ── Helpers ──────────────────────────────────────────────
  function clearMessages() {
    const msgs = document.getElementById("messages");
    msgs.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📖</div>
        <div class="empty-text">Ask something</div>
        <div class="empty-sub">Type your question below</div>
      </div>
    `;
  }

  function hideEmpty() {
    const el = document.getElementById("empty-state");
    if (el) el.remove();
  }

  function scrollToBottom() {
    const msgs = document.getElementById("messages");
    msgs.scrollTop = msgs.scrollHeight;
  }

  function setLoading(on) {
    document.getElementById("send-btn").disabled = on;
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 140) + "px";
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/\n/g, "<br>");
  }
</script>
</body>
</html>
