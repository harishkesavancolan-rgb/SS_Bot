# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────
# CI/CD Pipeline for RAG Ingestion Pipeline
#
# CI → runs on every push to feature/* branches
#       - installs dependencies
#       - runs pytest
#
# CD → runs when a PR is merged into main
#       - builds Docker image
#       - pushes to AWS ECR
# ─────────────────────────────────────────────────────────────

name: RAG Ingest Pipeline — CI/CD


# ── When does this workflow trigger? ─────────────────────────
on:
  push:
    branches:
      - "feature/*"       # CI: triggers on any feature branch push
  pull_request:
    branches:
      - main              # CD: triggers when PR is merged into main


# ── Jobs ─────────────────────────────────────────────────────
# A job is a set of steps that run on the same machine.
# We have 2 jobs: test (CI) and deploy (CD).
jobs:

# ═════════════════════════════════════════════════════════════
# JOB 1 — CI: Run Tests
# Runs on every push to feature/* branches
# ═════════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest    # GitHub spins up a fresh Linux machine

    steps:

      # Step 1: Checkout
      # Downloads your code onto the GitHub Actions machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      # Installs Python 3.11 on the machine
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Cache dependencies
      # If requirements.txt hasn't changed, reuse cached packages
      # This makes CI runs much faster (skips reinstalling every time)
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      # Step 5: Run tests
      # If any test fails, the job fails here and CD never runs
      - name: Run pytest
        run: pytest --tb=short


# ═════════════════════════════════════════════════════════════
# JOB 2 — CD: Build & Push Docker image to ECR
# Only runs on push to main (i.e. when a PR is merged)
# Only runs IF the test job passed 
# ═════════════════════════════════════════════════════════════
  deploy:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test             # ← waits for test job to pass first

    # Only run this job when code is merged into main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Allow this job to request an AWS token via OIDC
    # (this is how GitHub Actions authenticates with AWS securely
    #  without storing long-lived AWS keys as secrets)
    permissions:
      id-token: write
      contents: read

    steps:

      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Authenticate with AWS
      # Uses the IAM Role we created (github-actions-rag)
      # No AWS_ACCESS_KEY needed — OIDC handles it securely
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3: Log in to ECR
      # Gets a temporary password to push Docker images to ECR
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Build, tag and push Docker image
      # Tags the image with:
      #   - the git commit SHA (unique per push, e.g. abc1234)
      #   - "latest" (always points to the most recent image)
      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}       # unique commit ID
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"