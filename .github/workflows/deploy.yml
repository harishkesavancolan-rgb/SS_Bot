# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────
# CI/CD Pipeline for RAG Chatbot
#
# CI → runs on every push to feature/* and main
#       - installs dependencies
#       - runs pytest
#
# CD → runs when code is pushed to main
#       - builds TWO Docker images:
#           rag-ingest → ingestion pipeline
#           rag-chat   → FastAPI chat API
#       - pushes both to AWS ECR
# ─────────────────────────────────────────────────────────────

name: RAG Chatbot — CI/CD

on:
  push:
    branches:
      - "feature/*"
      - "main"
  pull_request:
    branches:
      - main

jobs:

# ═════════════════════════════════════════════════════════════
# JOB 1 — CI: Run Tests
# ═════════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest --tb=short


# ═════════════════════════════════════════════════════════════
# JOB 2 — CD: Build & Push BOTH images to ECR
# Only runs on push to main
# ═════════════════════════════════════════════════════════════
  deploy:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & Push ingestion image ──────────────────────
      - name: Build & push rag-ingest image
        env:
          ECR_REGISTRY  : ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG     : ${{ github.sha }}
        run: |
          docker build -f Dockerfile.ingest \
            -t $ECR_REGISTRY/rag-ingest:$IMAGE_TAG \
            -t $ECR_REGISTRY/rag-ingest:latest .
          docker push $ECR_REGISTRY/rag-ingest:$IMAGE_TAG
          docker push $ECR_REGISTRY/rag-ingest:latest
          echo "✅ rag-ingest pushed: $ECR_REGISTRY/rag-ingest:$IMAGE_TAG"

      # ── Build & Push chat image ───────────────────────────
      - name: Build & push rag-chat image
        env:
          ECR_REGISTRY  : ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG     : ${{ github.sha }}
        run: |
          docker build -f Dockerfile.chat \
            -t $ECR_REGISTRY/rag-chat:$IMAGE_TAG \
            -t $ECR_REGISTRY/rag-chat:latest .
          docker push $ECR_REGISTRY/rag-chat:$IMAGE_TAG
          docker push $ECR_REGISTRY/rag-chat:latest
          echo "✅ rag-chat pushed: $ECR_REGISTRY/rag-chat:$IMAGE_TAG"